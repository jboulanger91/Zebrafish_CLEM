# Conda environment for hindbrain structure-function analysis
# Create with: conda env create -f environment.yml
# Activate with: conda activate hbsf
# Last verified: 2026-02-20 with Python 3.12.9

name: hbsf
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.12
  # Core data processing
  - numpy>=2.0
  - pandas>=2.2
  - scipy>=1.15
  - h5py>=3.13
  # Machine learning
  - scikit-learn==1.5.2
  - scikit-image>=0.25
  - xgboost>=3.0
  # Visualization
  - matplotlib>=3.10
  - seaborn>=0.13
  - plotly>=6.0
  - bokeh>=3.7
  - holoviews>=1.20
  # Image processing
  - tifffile>=2025.3
  - opencv>=4.11
  - imageio>=2.37
  - pillow>=11.1
  # Morphology / 3D
  - trimesh>=4.6
  - igraph>=0.11
  - networkx>=3.4
  - pykdtree>=1.3
  # Neuroimaging file I/O
  - nibabel>=5.3
  - pynrrd>=1.1
  # Utilities
  - chardet>=5.2
  - tqdm>=4.67
  - openpyxl>=3.1
  - natsort>=8.4
  - pyyaml>=6.0
  - toml>=0.10
  - panel>=1.6
  - joblib>=1.4
  # Testing and linting
  - pytest>=8.3
  - ruff>=0.14
  - pip:
    - navis>=1.10
    - cellpose>=3.1
    - cloud-volume>=12.1
    - morphio>=3.4
    - skeletor>=1.3
